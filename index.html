<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fce4ec, #f3e5f5);
    color: #4a148c;
    padding: 20px;
}

h2 {
    color: #880e4f;
    text-align: center;
}

form {
    background-color: #ffffff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 8px rgba(136, 14, 79, 0.2);
    width: 60%;
    margin: 0 auto 20px auto;
    border: 2px solid #ce93d8;
}

input[type="text"], input[type="tel"] {
    padding: 8px;
    margin: 5px;
    border: 2px solid #ba68c8;
    border-radius: 6px;
    outline: none;
}

input[type="text"]:focus, input[type="tel"]:focus {
    border-color: #9c27b0;
    box-shadow: 0 0 5px rgba(156, 39, 176, 0.4);
}

button {
    background-color: #ab47bc;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10
}
</style>

</head>
<body>

<h2>Contacto</h2>

<form id="formulario">
    Nombre: <input type="text" id="nombre" required>
    Apellido: <input type="text" id="apellido" required>
    Teléfono: <input type="tel" id="telefono" required>
    <button type="submit">Enviar</button>
</form>

<!-- TABLA (IMPORTANTE) -->
<table id="tabla">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Teléfono</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script>
document.getElementById("formulario").addEventListener("submit", function(e) {
    e.preventDefault(); // EVITA QUE SE RECARGUE LA PÁGINA

    let nombre = document.getElementById("nombre").value;
    let apellido = document.getElementById("apellido").value;
    let telefono = document.getElementById("telefono").value;

    let tabla = document.getElementById("tabla").getElementsByTagName("tbody")[0];

    let fila = tabla.insertRow();

    fila.insertCell(0).textContent = nombre;
    fila.insertCell(1).textContent = apellido;
    fila.insertCell(2).textContent = telefono;

    // Limpia el formulario
    document.getElementById("formulario").reset();
});
</script>

</body>
</html>
